<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* colors + weights sampled from live oneflow.cz / offer.oneflow.cz */
  :root{
    --bg:#0A0A0C; --bg-2:#0C0C0E; --bg-3:#080809;
    --ink:#EBEBEB;        /* hope / gain / answer */
    --ink-2:#A8A6A3;      /* proof body */
    --dim:#6A6A6C;        /* dull "before" state */
    --muted:#56565A;      /* labels */
    --line:rgba(255,255,255,0.11);
    --m:80px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px}
  body{
    font-family:'Inter Tight',system-ui,sans-serif;
    background:linear-gradient(180deg,var(--bg-2) 0%,var(--bg) 58%,var(--bg-3) 100%);
    color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;
  }
  .frame{height:1350px;padding:var(--m);display:flex;flex-direction:column}

  .top{flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
  .logo svg{width:158px;height:auto;display:block}
  .brand{font-size:23px;font-weight:600;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--muted)}

  .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
  /* Hormozi avatar callout — names the elite buyer (the hour that decides a mandate) */
  .kicker{display:inline-flex;align-self:flex-start;align-items:center;gap:12px;
    font-size:24px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-2);
    border:1px solid var(--line);border-radius:999px;padding:13px 22px;margin-bottom:48px}
  .kicker .dot{width:8px;height:8px;border-radius:50%;background:var(--ink)}
  /* before: pain — the missed whale, raised stakes */
  .pain{font-size:48px;font-weight:600;line-height:1.14;letter-spacing:-0.015em;color:var(--dim)}
  /* after: gain — the message, bright + huge; line-height gives the pill air */
  .gain{margin-top:36px;font-size:80px;font-weight:700;line-height:1.2;
    letter-spacing:-0.035em;color:var(--ink)}
  .hl{background:var(--ink);color:#0A0A0C;border-radius:12px;padding:.05em .16em;
    -webkit-box-decoration-break:clone;box-decoration-break:clone}

  /* structured proof band — conviction · explainability · discretion */
  .proof{flex-shrink:0;border-top:1px solid var(--line);padding-top:44px;
    display:grid;grid-template-columns:auto 1fr 1fr;gap:0}
  .cell{padding:0 38px;display:flex;align-items:center;gap:26px}
  .cell:first-child{padding-left:0}
  .cell + .cell{border-left:1px solid var(--line)}
  .ring{position:relative;width:128px;height:128px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .c .n{font-size:48px;font-weight:700;line-height:1;letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums;color:var(--ink)}
  .ring .c .l{margin-top:2px;font-size:17px;font-weight:600;letter-spacing:0.12em;color:var(--muted)}
  .big{font-size:64px;font-weight:700;line-height:0.9;letter-spacing:-0.02em;color:var(--ink);flex-shrink:0}
  .lab{font-size:25px;font-weight:400;line-height:1.28;color:var(--ink-2)}
  .lab b{color:var(--ink);font-weight:600}
</style>
</head>
